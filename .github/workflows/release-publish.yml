# =============================================================================
# GitHub Action: Publish Skill to npm & Claude Skill Marketplace
# -----------------------------------------------------------------------------
# Triggers when a GitHub Release is published, then:
#   1. Validates the skill against the Agent Skills spec (agentskills.io)
#   2. Configures the repo for marketplace discoverability
#   3. Publishes the package to npm
#
# Required secrets:
#   NPM_TOKEN  — npm access token with publish permissions
# =============================================================================

name: Publish Skill to npm & Marketplace

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm & Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (if any)
        run: npm ci || true

      # ── Step 1: Publish to npm ──────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Step 2: Validate skill against Agent Skills spec ────────────
      # gh skill publish (v2.90.0+) validates SKILL.md frontmatter,
      # naming conventions, and directory structure per agentskills.io.
      # --dry-run skips release creation (already handled by the trigger).
      - name: Update GitHub CLI to latest
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gh

      - name: Validate skill against Agent Skills spec
        run: gh skill publish --dry-run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      # ── Step 3: Configure repo for marketplace discoverability ─────
      # Adding the "agent-skills" topic helps users discover the skill
      # via GitHub search, gh skill search, and aggregator sites.
      - name: Add agent-skills topic to repository
        run: |
          gh repo edit "${{ github.repository }}" --add-topic agent-skills
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
